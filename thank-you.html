<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MZ72FDZSNT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-MZ72FDZSNT');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Dikshit</title>
    <link rel="stylesheet" href="contact.css">
    <script src="https://kit.fontawesome.com/9fcb8631fd.js" crossorigin="anonymous"></script>
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        
        .thank-you-content {
            max-width: 600px;
            background: rgba(15, 15, 30, 0.6);
            border: 2px solid rgba(114, 161, 222, 0.25);
            border-radius: 30px;
            padding: 60px 40px;
            backdrop-filter: blur(15px);
        }
        
        .thank-you-icon {
            font-size: 80px;
            color: #72a1de;
            margin-bottom: 30px;
        }
        
        .thank-you-content h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: white;
        }
        
        .thank-you-content p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            color: white;
            padding: 14px 40px;
            border: 2px solid #727fde;
            border-radius: 15px;
            background: rgba(114, 127, 222, 0.2);
            box-shadow: 0 0 20px rgba(114, 127, 222, 0.3);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-home-btn:hover {
            background: #727fde;
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(114, 127, 222, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <video class="back-vid" autoplay loop muted src="video/galaxy.mp4"></video>
        
        <section class="thank-you-section">
            <div class="thank-you-content">
                <div class="thank-you-icon">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h1>Thank You!</h1>
                <p>Your message has been sent successfully. I'll get back to you as soon as possible, usually within 24 hours.</p>
                <a href="index.html" class="back-home-btn">
                    <i class="fa-solid fa-house"></i>
                    Back to Home
                </a>
            </div>
        </section>
    </div>
</body>
</html>
